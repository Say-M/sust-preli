services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sust-2026-preli-api
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      SERVER_URL: ${SERVER_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
