services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sust-2026-preli-api
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      SERVER_URL: ${SERVER_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r = await fetch('http://127.0.0.1:3000/health'); process.exit(r.ok ? 0 : 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
